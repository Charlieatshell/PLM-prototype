<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PLM149 GPC Data Setup</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    /* Import Shell Design System */
    body {
      margin: 0;
      padding: 0;
    }

    .accent-bar {
      height: 4px;
      background: var(--shell-yellow);
    }

    /* Top Bar */
    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 24px;
      background: white;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 200;
    }

    .top-bar-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .app-logo {
      font-size: 1.5rem;
    }

    .app-info {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .app-category {
      font-size: 0.75rem;
      color: var(--text-tertiary);
      font-weight: 500;
    }

    .app-title {
      font-size: 1rem;
      font-weight: 600;
      color: var(--text-primary);
    }

    .top-bar-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .top-bar-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 1rem;
      color: var(--text-secondary);
    }

    .user-profile {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.875rem;
      color: var(--text-primary);
    }

    .user-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: #ff9800;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      font-weight: 600;
    }

    /* Breadcrumb & Status */
    .header-meta {
      padding: 12px 24px;
      background: white;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 56px;
      z-index: 199;
    }

    .breadcrumb {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 0.875rem;
      color: var(--text-secondary);
    }

    .status-badge {
      padding: 2px 8px;
      background: var(--background-muted);
      color: var(--text-primary);
      border-radius: 3px;
      font-size: 0.75rem;
      font-weight: 600;
    }

    /* Tab Navigation */
    .tab-navigation {
      display: flex;
      gap: 0;
      padding: 0 24px;
      background: white;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 100px;
      z-index: 198;
    }

    .tab-btn {
      padding: 12px 16px;
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      cursor: pointer;
      color: var(--text-secondary);
      font-size: 0.875rem;
      font-weight: 500;
      transition: all 0.2s;
    }

    .tab-btn:hover {
      color: var(--text-primary);
    }

    .tab-btn.active {
      color: var(--text-primary);
      border-bottom-color: #ff9800;
      font-weight: 600;
    }

    /* Form Header Sticky */
    .form-header-sticky {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 24px;
      background: white;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 134px;
      z-index: 197;
    }

    .form-header-left {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 200px;
    }

    .form-header-left h1 {
      margin: 0;
      font-size: 1.125rem;
      font-weight: 600;
      color: var(--text-primary);
    }

    .plm-badge {
      padding: 2px 8px;
      background: #e8f5e9;
      color: #2e7d32;
      border-radius: 3px;
      font-size: 0.7rem;
      font-weight: 700;
    }

    .form-header-center {
      display: flex;
      align-items: center;
      gap: 12px;
      flex: 1;
      justify-content: center;
    }

    .product-label {
      font-size: 0.875rem;
      color: var(--text-primary);
      font-weight: 500;
    }

    .product-btn {
      padding: 6px 12px;
      background: var(--background-muted);
      border: none;
      border-radius: 4px;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      color: var(--text-primary);
      transition: all 0.2s;
    }

    .product-btn.active {
      background: #0066cc;
      color: white;
    }

    .product-btn:hover {
      background: #0066cc;
      color: white;
    }

    .form-header-right {
      min-width: 80px;
      text-align: right;
    }

    .btn-save {
      padding: 8px 16px;
      background: white;
      border: 1px solid var(--border);
      border-radius: 4px;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      color: var(--text-primary);
      transition: background 0.2s;
    }

    .btn-save:hover {
      background: var(--background-muted);
    }

    /* Content Area */
    .page-container {
      padding: 32px 24px;
      background: var(--background-surface);
    }

    .form-content {
      max-width: 1200px;
      margin: 0 auto;
      background: white;
      border-radius: 4px;
      border: 1px solid var(--border);
      padding: 32px;
    }

    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 0 12px 0;
      margin-bottom: 24px;
      border-bottom: 2px solid var(--shell-yellow);
    }

    .section-header h2 {
      font-size: 1rem;
      font-weight: 600;
      margin: 0;
      color: var(--text-primary);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .p1-badge {
      display: inline-flex;
      padding: 2px 8px;
      background: #e3f2fd;
      color: #0066cc;
      border-radius: 3px;
      font-size: 0.65rem;
      font-weight: 700;
    }

    .section-expand-btn {
      background: none;
      border: none;
      color: var(--text-secondary);
      cursor: pointer;
      font-size: 1rem;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0 32px;
    }

    .form-field {
      display: flex;
      flex-direction: column;
      margin-bottom: 16px;
    }

    .field-label {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.8125rem;
      font-weight: 500;
      margin-bottom: 6px;
      color: var(--text-primary);
    }

    .required {
      color: #d32f2f;
    }

    .info-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: transparent;
      border: 1px solid #999;
      color: #666;
      font-size: 0.65rem;
      font-weight: bold;
      cursor: help;
      flex-shrink: 0;
    }

    .form-control {
      padding: 8px 12px;
      border: 1px solid var(--border);
      border-radius: 4px;
      font-family: inherit;
      font-size: 0.875rem;
      color: var(--text-primary);
      background: white;
    }

    .form-control:focus {
      outline: none;
      border-color: #007fa2;
      box-shadow: 0 0 0 3px rgba(0, 127, 162, 0.1);
    }

    textarea.form-control {
      resize: vertical;
      min-height: 80px;
    }
  </style>
</head>
<body>
  <div class="accent-bar"></div>

  <!-- Top Bar -->
  <div class="top-bar">
    <div class="top-bar-left">
      <div class="app-logo">📊</div>
      <div class="app-info">
        <div class="app-category">Trading and Supply</div>
        <div class="app-title">PLM Toolkit - Fuels</div>
      </div>
    </div>
    <div class="top-bar-right">
      <button class="top-bar-btn">☀️</button>
      <button class="top-bar-btn">⚙️</button>
      <div class="user-profile">
        <div class="user-avatar">JB</div>
        <span>Joe Bloggs</span>
      </div>
    </div>
  </div>

  <!-- Breadcrumb & Status -->
  <div class="header-meta">
    <div class="breadcrumb">
      <span>PLM149 › Supply › US › All Products › SC1 › GPC Data Setup</span>
      <span class="status-badge">Draft</span>
    </div>
  </div>

  <!-- Tab Navigation -->
  <div class="tab-navigation">
    <button class="tab-btn">Request Setup</button>
    <button class="tab-btn active">GPC Data Setup</button>
    <button class="tab-btn">Request Review</button>
  </div>

  <!-- Form Header -->
  <div class="form-header-sticky">
    <div class="form-header-left">
      <h1>GPC Data Setup</h1>
      <span class="plm-badge">PLM149</span>
    </div>
    <div class="form-header-center">
      <span class="product-label">Products</span>
      <button class="product-btn active">P1</button>
      <button class="product-btn">P2</button>
      <button class="product-btn">P3</button>
      <button class="product-btn">P4</button>
    </div>
    <div class="form-header-right">
      <button class="btn-save">Save</button>
    </div>
  </div>

  <!-- Content Area -->
  <div class="page-container">
    <div class="form-content">
      <div class="section-header">
        <h2><span class="p1-badge">P1</span>Naming</h2>
        <button class="section-expand-btn">⤢</button>
      </div>

      <div class="form-grid">
        <!-- Left Column -->
        <div>
          <div class="form-field">
            <label class="field-label">
              TASK <span class="required">*</span>
              <span class="info-icon">i</span>
            </label>
            <input type="text" class="form-control" placeholder="SC. 1 - New Product/SKU Set up" />
          </div>

          <div class="form-field">
            <label class="field-label">
              PRODUCT TYPE <span class="required">*</span>
              <span class="info-icon">i</span>
            </label>
            <select class="form-control">
              <option>Select...</option>
              <option>Type A</option>
              <option>Type B</option>
            </select>
          </div>

          <div class="form-field">
            <label class="field-label">
              INTERMEDIATE FULL NAME <span class="required">*</span>
              <span class="info-icon">i</span>
            </label>
            <input type="text" class="form-control" placeholder="Placeholder" />
          </div>

          <div class="form-field">
            <label class="field-label">
              CAS NUMBER
              <span class="info-icon">i</span>
            </label>
            <input type="text" class="form-control" placeholder="Placeholder" />
          </div>

          <div class="form-field">
            <label class="field-label">
              GRADE <span class="required">*</span>
              <span class="info-icon">i</span>
            </label>
            <select class="form-control">
              <option>Select...</option>
              <option>Grade A</option>
              <option>Grade B</option>
            </select>
          </div>
        </div>

        <!-- Right Column -->
        <div>
          <div class="form-field">
            <label class="field-label">
              BRAND STATUS <span class="required">*</span>
              <span class="info-icon">i</span>
            </label>
            <select class="form-control">
              <option>Select...</option>
            </select>
          </div>

          <div class="form-field">
            <label class="field-label">
              COUNTRY NAME <span class="required">*</span>
              <span class="info-icon">i</span>
            </label>
            <select class="form-control">
              <option>United States</option>
            </select>
          </div>

          <div class="form-field">
            <label class="field-label">
              MANUFACTURING LOCATION/VENDOR <span class="required">*</span>
              <span class="info-icon">i</span>
            </label>
            <textarea class="form-control" placeholder="Placeholder"></textarea>
          </div>

          <div class="form-field">
            <label class="field-label">
              OTHER TEXT
              <span class="info-icon">i</span>
            </label>
            <input type="text" class="form-control" placeholder="Placeholder" />
          </div>

          <div class="form-field">
            <label class="field-label">
              OCTANE <span class="required">*</span>
              <span class="info-icon">i</span>
            </label>
            <select class="form-control">
              <option>Select...</option>
            </select>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
